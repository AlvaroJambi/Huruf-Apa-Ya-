<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Game Tebak Huruf</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('Background.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            overflow: hidden;
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 50px; 
            text-align: center; width: 350px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); 
        }
        /* Judul di atas gambar */
        .title { font-size: 1.8rem; font-weight: bold; color: #ff9ff3; margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #777; }
        .image { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.2)); }
        .word { font-size: 2.5rem; font-weight: bold; color: #555; letter-spacing: 8px; margin-bottom: 20px; }
        
        .options { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .btn-option { 
            width: 55px; height: 55px; border: 3px dashed #ff9ff3; border-radius: 50%; 
            font-size: 20px; font-weight: bold; cursor: pointer; color: white;
            background: #f8a5c2; box-shadow: 0 4px 0 #e77f67;
        }

        /* Tombol Bulat Navigasi */
        .nav-container { display: flex; justify-content: center; gap: 15px; }
        .nav-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            background: #a29bfe; color: white; cursor: pointer; font-size: 0.7rem; font-weight: bold;
            box-shadow: 0 4px 0 #6c5ce7; transition: 0.2s;
        }
        .nav-btn:hover { transform: scale(1.1); }
        
        .confetti { position: fixed; font-size: 25px; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="Musik.mp3" loop></audio>
    <audio id="soundBenar" src="Benar.mp3"></audio>
    <audio id="soundSalah" src="Salah.mp3"></audio>

    <div class="card">
        <div class="header">
            <span id="scoreText">Skor: 0</span>
            <span id="levelText">1/20</span>
        </div>
        <div class="title">Huruf apa ya?</div>
        <div class="image" id="imgDisplay">🍎</div>
        <div class="word" id="wordDisplay">_PEL</div>
        <div class="options" id="options"></div>
        
        <div class="nav-container">
            <button class="nav-btn" onclick="load()">Ulang</button>
            <button class="nav-btn" onclick="prev()">Kembali</button>
            <button class="nav-btn" onclick="next()">Lanjut</button>
        </div>
    </div>

    <script>
        const levels = [
            {img: '🍎', word: '_PEL', answer: 'A'}, {img: '🍌', word: '_ISANG', answer: 'P'},
            {img: '🍇', word: '_NGGUR', answer: 'A'}, {img: '🍓', word: '_TR_WBERI', answer: 'S'},
            {img: '🍍', word: '_ANAS', answer: 'N'}, {img: '🍒', word: '_ERI', answer: 'C'},
            {img: '🥝', word: '_IWI', answer: 'K'}, {img: '🍉', word: '_EMANGKA', answer: 'S'},
            {img: '🥑', word: '_PUKAT', answer: 'A'}, {img: '🍑', word: '_ERSIK', answer: 'P'},
            {img: '🥭', word: '_ANGGA', answer: 'M'}, {img: '🍋', word: '_EMON', answer: 'L'},
            {img: '🥥', word: '_ELAPA', answer: 'K'}, {img: '🍐', word: '_IR', answer: 'P'},
            {img: '🍈', word: '_ELON', answer: 'M'}, {img: '🍊', word: '_ERUK', answer: 'J'},
            {img: '🍏', word: '_PEL HIJAU', answer: 'A'}, {img: '🫐', word: '_LUBERRY', answer: 'B'},
            {img: '🍅', word: '_OMAT', answer: 'T'}, {img: '🌽', word: '_AGUNG', answer: 'J'}
        ];
        let current = 0, score = 0;

        document.addEventListener('click', () => document.getElementById('bgMusic').play(), {once: true});

        function triggerConfetti() {
            for(let i=0; i<30; i++) {
                const c = document.createElement('div');
                c.className = 'confetti'; c.innerText = '🎊';
                c.style.left = Math.random()*100 + 'vw'; c.style.top = '-20px';
                document.body.appendChild(c);
                c.animate([{transform: 'translate(0,0)'}, {transform: `translate(${(Math.random()-0.5)*500}px, 800px)`}], {duration: 3000});
                setTimeout(() => c.remove(), 3000);
            }
        }

        function load() {
            const l = levels[current];
            document.getElementById('imgDisplay').innerText = l.img;
            document.getElementById('wordDisplay').innerText = l.word;
            document.getElementById('levelText').innerText = `${current + 1}/20`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            [l.answer, 'X', 'Y'].sort(() => Math.random()-0.5).forEach(char => {
                const b = document.createElement('button');
                b.className = 'btn-option'; b.innerText = char;
                b.onclick = () => {
                    if(char === l.answer) {
                        document.getElementById('wordDisplay').innerText = l.word.replace('_', char);
                        document.getElementById('soundBenar').play();
                        score += 10; document.getElementById('scoreText').innerText = `Skor: ${score}`;
                        triggerConfetti();
                        setTimeout(next, 1500);
                    } else {
                        document.getElementById('soundSalah').play();
                        b.style.background = '#ff7675';
                    }
                };
                optDiv.appendChild(b);
            });
        }

        function next() { current = (current + 1) % 20; load(); }
        function prev() { current = (current - 1 + 20) % 20; load(); }
        
        load();
    </script>
</body>
</html>
