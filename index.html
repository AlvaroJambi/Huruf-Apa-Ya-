<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tebak Huruf Clay 3D</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('Background.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            overflow: hidden;
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; 
            border-radius: 50px; 
            text-align: center; 
            width: 320px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); 
        }
        /* Jarak gambar ke bawah diperbesar */
        .image { font-size: 80px; margin-bottom: 30px; filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.2)); }
        .word { font-size: 2.5rem; font-weight: bold; color: #555; letter-spacing: 8px; margin-bottom: 30px; }
        
        .options { display: flex; justify-content: center; gap: 15px; }
        
        /* Tombol diperkecil agar proporsional */
        .btn { 
            width: 55px; height: 55px; border: 3px dashed #ff9ff3; border-radius: 15px; 
            font-size: 20px; font-weight: bold; cursor: pointer; color: white;
            background: #f8a5c2; box-shadow: 0 4px 0 #e77f67;
            transition: transform 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        /* Animasi confetti menyebar dari atas ke bawah */
        .confetti { position: fixed; font-size: 25px; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="Musik.mp3" loop></audio>
    <audio id="soundBenar" src="Benar.mp3"></audio>
    <audio id="soundSalah" src="Salah.mp3"></audio>

    <div class="card">
        <div class="image" id="imgDisplay">🍎</div>
        <div class="word" id="wordDisplay">_PEL</div>
        <div class="options" id="options"></div>
    </div>

    <script>
        const levels = [
            {img: '🍎', word: '_PEL', answer: 'A'}, {img: '🍌', word: '_ISANG', answer: 'P'},
            {img: '🍇', word: '_NGGUR', answer: 'A'}, {img: '🍓', word: '_TR_WBERI', answer: 'S'},
            {img: '🍍', word: '_ANAS', answer: 'N'}, {img: '🍒', word: '_ERI', answer: 'C'},
            {img: '🥝', word: '_IWI', answer: 'K'}, {img: '🍉', word: '_EMANGKA', answer: 'S'},
            {img: '🥑', word: '_PUKAT', answer: 'A'}, {img: '🍑', word: '_ERSIK', answer: 'P'},
            {img: '🥭', word: '_ANGGA', answer: 'M'}, {img: '🍋', word: '_EMON', answer: 'L'},
            {img: '🥥', word: '_ELAPA', answer: 'K'}, {img: '🍐', word: '_IR', answer: 'P'},
            {img: '🍈', word: '_ELON', answer: 'M'}, {img: '🍊', word: '_ERUK', answer: 'J'},
            {img: '🍏', word: '_PEL HIJAU', answer: 'A'}, {img: '🫐', word: '_LUBERRY', answer: 'B'},
            {img: '🍅', word: '_OMAT', answer: 'T'}, {img: '🌽', word: '_AGUNG', answer: 'J'}
        ];
        let current = 0;

        document.addEventListener('click', () => document.getElementById('bgMusic').play(), {once: true});

        function triggerConfetti() {
            for(let i=0; i<30; i++) {
                const c = document.createElement('div');
                c.className = 'confetti'; c.innerText = '🎊';
                c.style.left = Math.random()*100 + 'vw';
                c.style.top = '-20px';
                document.body.appendChild(c);
                
                // Animasi jatuh ke bawah dengan durasi acak
                c.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(100vh) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 2000 + Math.random()*2000, easing: 'linear' });
                
                setTimeout(() => c.remove(), 4000);
            }
        }

        function load() {
            const l = levels[current];
            document.getElementById('imgDisplay').innerText = l.img;
            document.getElementById('wordDisplay').innerText = l.word;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            [l.answer, 'X', 'Y'].sort(() => Math.random()-0.5).forEach(char => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = char;
                b.onclick = () => {
                    if(char === l.answer) {
                        document.getElementById('wordDisplay').innerText = l.word.replace('_', char);
                        document.getElementById('soundBenar').play();
                        triggerConfetti();
                        setTimeout(() => { current = (current+1)%20; load(); }, 1500);
                    } else {
                        document.getElementById('soundSalah').play();
                        b.style.background = '#ff7675';
                    }
                };
                optDiv.appendChild(b);
            });
        }
        load();
    </script>
</body>
</html>
