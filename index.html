<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Huruf apa ya?</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: url('Background.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            overflow: hidden;
        }
        .card { 
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 50px; 
            text-align: center; width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            border: 5px solid #fff;
        }
        /* Judul Putih dengan latar tombol lebih gelap */
        .title-badge { 
            width: 220px; padding: 12px; margin: 0 auto 20px auto;
            background: #d63031; border-radius: 30px; font-weight: bold; color: white;
            font-size: 1.2rem; box-shadow: 0 6px 0 #b71c1c; border: 3px solid #b71c1c;
        }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #555; }
        
        /* Gambar Kartun 3D Efek */
        .image { 
            font-size: 100px; margin-bottom: 20px; 
            filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.2));
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-15px);} }
        
        .word { font-size: 3rem; font-weight: bold; color: #2d3436; letter-spacing: 12px; margin-bottom: 25px; text-shadow: 2px 2px #dfe6e9; }
        
        .options { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .btn-option { 
            width: 65px; height: 65px; border-radius: 20px; 
            font-size: 24px; font-weight: bold; cursor: pointer; color: white;
            border: none; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-option:active { transform: translateY(4px); box-shadow: none; }

        .nav-container { display: flex; justify-content: center; gap: 25px; }
        .nav-btn { 
            width: 65px; height: 65px; border-radius: 50%; border: none; 
            background: #6c5ce7; color: white; cursor: pointer; font-size: 0.8rem; font-weight: bold;
            box-shadow: 0 5px 0 #4834d4; transition: 0.2s;
        }
        .confetti { position: fixed; font-size: 30px; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="Musik.mp3" loop></audio>
    <audio id="soundBenar" src="Benar.mp3"></audio>
    <audio id="soundSalah" src="Salah.mp3"></audio>

    <div class="card">
        <div class="header">
            <span id="scoreText">Skor: 0</span>
            <span id="levelText">1/20</span>
        </div>
        <div class="title-badge">Huruf apa ya?</div>
        <div class="image" id="imgDisplay">🍎</div>
        <div class="word" id="wordDisplay">_PEL</div>
        <div class="options" id="options"></div>
        
        <div class="nav-container">
            <button class="nav-btn" onclick="prev()">◀</button>
            <button class="nav-btn" onclick="next()">▶</button>
        </div>
    </div>

    <script>
        const levels = [
            {img: '🍎', word: '_PEL', answer: 'A'}, {img: '🍌', word: '_ISANG', answer: 'P'},
            {img: '🍇', word: '_NGGUR', answer: 'A'}, {img: '🍓', word: '_TRAWBERI', answer: 'S'},
            {img: '🍍', word: '_ANAS', answer: 'N'}, {img: '🍒', word: '_ERI', answer: 'C'},
            {img: '🥝', word: '_IWI', answer: 'K'}, {img: '🍉', word: '_EMANGKA', answer: 'S'},
            {img: '🥑', word: '_PUKAT', answer: 'A'}, {img: '🍑', word: '_ERSIK', answer: 'P'},
            {img: '🥭', word: '_ANGGA', answer: 'M'}, {img: '🍋', word: '_EMON', answer: 'L'},
            {img: '🥥', word: '_ELAPA', answer: 'K'}, {img: '🍐', word: '_IR', answer: 'P'},
            {img: '🍈', word: '_ELON', answer: 'M'}, {img: '🍊', word: '_ERUK', answer: 'J'},
            {img: '🍏', word: '_PEL HIJAU', answer: 'A'}, {img: '🫐', word: '_LUBERRY', answer: 'B'},
            {img: '🍅', word: '_OMAT', answer: 'T'}, {img: '🌽', word: '_AGUNG', answer: 'J'}
        ];
        let current = 0, score = 0;
        // Warna cerah untuk tombol
        const colors = ['#0984e3', '#00b894', '#e17055', '#6c5ce7', '#fdcb6e'];

        document.addEventListener('click', () => document.getElementById('bgMusic').play(), {once: true});

        function triggerConfetti() {
            for(let i=0; i<40; i++) {
                const c = document.createElement('div');
                c.className = 'confetti'; c.innerText = '🎊';
                c.style.left = Math.random()*100 + 'vw'; c.style.top = '-20px';
                document.body.appendChild(c);
                c.animate([{transform: 'translate(0,0) rotate(0deg)'}, {transform: `translate(${(Math.random()-0.5)*800}px, 100vh) rotate(720deg)`}], {duration: 3000});
                setTimeout(() => c.remove(), 3000);
            }
        }

        function load() {
            const l = levels[current];
            document.getElementById('imgDisplay').innerText = l.img;
            document.getElementById('wordDisplay').innerText = l.word;
            document.getElementById('levelText').innerText = `${current + 1}/20`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            [l.answer, 'X', 'Y'].sort(() => Math.random()-0.5).forEach(char => {
                const b = document.createElement('button');
                b.className = 'btn-option'; b.innerText = char;
                b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                b.onclick = () => {
                    if(char === l.answer) {
                        document.getElementById('wordDisplay').innerText = l.word.replace('_', char);
                        document.getElementById('soundBenar').play();
                        score += 10; document.getElementById('scoreText').innerText = `Skor: ${score}`;
                        triggerConfetti();
                        setTimeout(next, 1500);
                    } else {
                        document.getElementById('soundSalah').play();
                        b.style.opacity = '0.3';
                    }
                };
                optDiv.appendChild(b);
            });
        }

        function next() { current = (current + 1) % 20; load(); }
        function prev() { current = (current - 1 + 20) % 20; load(); }
        
        load();
    </script>
</body>
</html>
